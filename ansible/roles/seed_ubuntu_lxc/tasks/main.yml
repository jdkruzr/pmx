---
- name: Refresh pveam catalog
  ansible.builtin.command: pveam update
  changed_when: false

- name: List available Ubuntu LXC templates
  ansible.builtin.command: pveam available --section system
  register: pveam_available
  changed_when: false

- name: Pick latest Ubuntu LXC template matches
  ansible.builtin.set_fact:
    ubuntu_lxc_matches: "{{ pveam_available.stdout_lines | map('regex_replace', '^.*\\s', '') | select('match', ubuntu_lxc_template_pattern) | list | sort }}"

- name: Set chosen template
  ansible.builtin.set_fact:
    ubuntu_lxc_template: "{{ ubuntu_lxc_matches[-1] if ubuntu_lxc_matches else '' }}"

- name: Fail if no Ubuntu LXC template is listed
  ansible.builtin.fail:
    msg: "No Ubuntu LXC template found. Pattern: {{ ubuntu_lxc_template_pattern }}"
  when: ubuntu_lxc_template == ""

- name: Check whether template is already downloaded
  ansible.builtin.command: "pveam list {{ default_lxc_storage }}"
  register: pveam_list
  changed_when: false

- name: Download Ubuntu LXC template
  ansible.builtin.command: "pveam download {{ default_lxc_storage }} {{ ubuntu_lxc_template }}"
  when: >-
    pveam_list.stdout_lines
    | select('search', ubuntu_lxc_template | regex_escape)
    | list | length == 0
  changed_when: true
