---
- name: Refresh pveam catalog
  ansible.builtin.command: pveam update
  changed_when: false

- name: List available Rocky 9 LXC templates
  ansible.builtin.command: pveam available --section system
  register: pveam_available
  changed_when: false

- name: Pick latest Rocky 9 LXC template matches
  ansible.builtin.set_fact:
    rocky_lxc_matches: "{{ pveam_available.stdout_lines | map('regex_replace', '^.*\\s', '') | select('match', rocky_lxc_template_pattern) | list | sort }}"

- name: Set chosen template
  ansible.builtin.set_fact:
    rocky_lxc_template: "{{ rocky_lxc_matches[-1] if rocky_lxc_matches else '' }}"

- name: Fail if no Rocky 9 LXC template is listed
  ansible.builtin.fail:
    msg: "No Rocky 9 LXC template found. Pattern: {{ rocky_lxc_template_pattern }}"
  when: rocky_lxc_template == ""

- name: Check whether template is already downloaded
  ansible.builtin.command: "pveam list {{ default_lxc_storage }}"
  register: pveam_list
  changed_when: false

- name: Download Rocky 9 LXC template
  ansible.builtin.command: "pveam download {{ default_lxc_storage }} {{ rocky_lxc_template }}"
  when: >-
    pveam_list.stdout_lines
    | select('search', rocky_lxc_template | regex_escape)
    | list | length == 0
  changed_when: true
