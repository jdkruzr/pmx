---
# Top-level provisioning playbook.
# Invoked by pmx CLI with extra-vars: guest_name, guest_kind (vm|lxc),
# guest_os (ubuntu|rocky), cores, memory, disk, cephfs_mounts (list),
# rbd_disk (int|null), extra_packages (list), static_ip (str|null),
# domain_join (bool), target_node, default_storage, default_lxc_storage,
# default_bridge, ad_domain, ad_realm, ad_join_user, proxmox_api_host.
# See ansible/group_vars/all.yml for defaults.

- name: Create guest on Proxmox
  hosts: "{{ target_node }}"
  gather_facts: false
  become: false
  tasks:
    - name: Create VM
      ansible.builtin.include_role:
        name: create_vm
      when: guest_kind == "vm"

    - name: Create LXC
      ansible.builtin.include_role:
        name: create_lxc
      when: guest_kind == "lxc"

- name: Configure guest
  hosts: just_created
  gather_facts: true
  become: "{{ guest_kind == 'vm' }}"
  tasks:
    - name: Run common bootstrap (upgrade + base packages)
      ansible.builtin.include_role:
        name: common

    - name: Join guest to AD (Ubuntu)
      ansible.builtin.include_role:
        name: ad_join_ubuntu
      when: domain_join | bool and guest_os == 'ubuntu'

    - name: Join guest to AD (Rocky)
      ansible.builtin.include_role:
        name: ad_join_rocky
      when: domain_join | bool and guest_os == 'rocky'

    - name: Attach extra RBD disk (VM only)
      ansible.builtin.include_role:
        name: attach_rbd_disk
      when: rbd_disk is not none

    - name: Mount CephFS shares
      ansible.builtin.include_role:
        name: mount_cephfs
      when: cephfs_mounts | default([]) | length > 0

    # The `extra_packages` extra-var (list) and the role of the same name share a name intentionally.
    - name: Install extra packages
      ansible.builtin.include_role:
        name: extra_packages
      when: extra_packages | default([]) | length > 0

    # Phase 8: post_create_hook
